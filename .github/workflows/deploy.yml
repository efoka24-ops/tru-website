name: CI + Docker + Deploy (GHCR)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tru-website
            context: ./tru-website
            dockerfile: ./tru-website/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/tru-website
            build_args: |
              VITE_API_URL=${{ secrets.VITE_API_URL }}
              VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
          - name: tru-backend
            context: ./tru-backend
            dockerfile: ./tru-backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/tru-backend
            build_args: ""
          - name: backofficetru
            context: ./backofficetru
            dockerfile: ./backofficetru/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/backofficetru
            build_args: |
              VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main/tags)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build_args }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "Login to GHCR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "Pull latest images"
            docker compose pull

            echo "Restart containers"
            docker compose up -d --remove-orphans

            echo "Cleanup old images"
            docker image prune -f